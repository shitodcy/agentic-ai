<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic AI - Multi-Agent System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg-body: #f0f2f5;
            --bg-container: #ffffff;
            --text-main: #333333;
            --text-muted: #555555;
            --text-heading: #1a1a2e;
            --bg-form: #f8f9fa;
            --border-color: #dee2e6;
            --input-bg: #ffffff;
            --input-border: #cccccc;
            
            --agent-sales-bg: rgba(0, 123, 255, 0.05);
            --agent-sales-border: #007bff;
            --agent-cap-bg: rgba(255, 193, 7, 0.1);
            --agent-cap-border: #ffc107;
            --agent-cap-text: #d39e00;
            --agent-proc-bg: rgba(40, 167, 69, 0.05);
            --agent-proc-border: #28a745;
            
            --btn-bg: #007bff;
            --btn-hover: #0056b3;
            --btn-text: #ffffff;
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --bg-container: #1e1e2e;
            --text-main: #e0e0e0;
            --text-muted: #b0b0b0;
            --text-heading: #ffffff;
            --bg-form: #2a2a3c;
            --border-color: #3e3e5e;
            --input-bg: #1e1e2e;
            --input-border: #4a4a6a;
            
            --agent-sales-bg: rgba(0, 123, 255, 0.15);
            --agent-sales-border: #4da3ff;
            --agent-cap-bg: rgba(255, 193, 7, 0.15);
            --agent-cap-border: #ffd54f;
            --agent-cap-text: #ffd54f;
            --agent-proc-bg: rgba(40, 167, 69, 0.15);
            --agent-proc-border: #4caf50;
            
            --btn-bg: #4da3ff;
            --btn-hover: #1a8cff;
            --btn-text: #ffffff;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: background-color 0.3s, color 0.3s, border-color 0.3s; }
        body { background: var(--bg-body); color: var(--text-main); margin: 0; padding: 40px 20px; display: flex; justify-content: center; }
        .container { max-width: 950px; width: 100%; background: var(--bg-container); padding: 30px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.12); }

        /* Header & Theme Toggle */
        .header-wrapper { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        h1 { display: flex; align-items: center; gap: 12px; font-size: 26px; margin: 0; color: var(--text-heading); }
        h1 i { color: var(--agent-sales-border); animation: pulse-icon 2s infinite; }
        @keyframes pulse-icon { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        
        .theme-toggle { background: transparent; border: 1px solid var(--border-color); color: var(--text-main); padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: 600; font-size: 14px; box-shadow: none; display: flex; align-items: center; gap: 8px; }
        .theme-toggle:hover { background: var(--bg-form); transform: translateY(-2px); }

        /* Status Box */
        .status-box { padding: 10px 18px; border-radius: 30px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; margin-bottom: 20px; border: 1px solid transparent; }
        .online { background: #d4edda; color: #155724; border-color: #c3e6cb; }
        .offline { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }
        [data-theme="dark"] .online { background: #1e4620; color: #a3d9a5; border-color: #2b592e; }
        [data-theme="dark"] .offline { background: #5c1e22; color: #f5c6cb; border-color: #721c24; }

        /* Form */
        .flex-form { display: flex; gap: 15px; flex-wrap: wrap; margin: 20px 0; background: var(--bg-form); padding: 20px; border-radius: 16px; align-items: flex-end; border: 1px solid var(--border-color); }
        .flex-form label { display: flex; flex-direction: column; font-weight: 500; font-size: 14px; flex: 1; min-width: 120px; }
        .flex-form input { padding: 10px; border: 2px solid var(--input-border); border-radius: 8px; margin-top: 4px; font-size: 14px; background: var(--input-bg); color: var(--text-main); }
        .flex-form input:focus { border-color: var(--agent-sales-border); outline: none; }
        .flex-form input.valid { border-color: #28a745; }
        .flex-form input.invalid { border-color: #dc3545; }
        .url-input { flex-basis: 100%; }
        .url-input input { width: 100%; }

        button.primary-btn { background: var(--btn-bg); color: var(--btn-text); border: none; padding: 12px 30px; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
        button.primary-btn:hover:not(:disabled) { background: var(--btn-hover); transform: translateY(-2px); }
        button.primary-btn:disabled { opacity: 0.6; cursor: not-allowed; background: #6c757d; transform: none; }

        /* Progress Bar */
        .progress-wrapper { margin: 15px 0 10px; display: none; }
        .progress-wrapper.active { display: block; }
        .progress-bar { width: 100%; height: 6px; background: var(--border-color); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--agent-sales-border), #00d4ff); transition: width 0.3s ease; }

        /* Result Area */
        #resultArea { margin-top: 30px; border-top: 2px solid var(--border-color); padding-top: 20px; }
        .summary { background: var(--bg-form); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border-color); }
        
        /* Multi-Agent Boxes */
        .agent-box { padding: 16px; border-radius: 8px; margin-top: 15px; border-left-width: 5px; border-left-style: solid; }
        .agent-sales { background: var(--agent-sales-bg); border-left-color: var(--agent-sales-border); }
        .agent-capacity { background: var(--agent-cap-bg); border-left-color: var(--agent-cap-border); }
        .agent-procurement { background: var(--agent-proc-bg); border-left-color: var(--agent-proc-border); }

        /* Status Badge */
        .status-badge { display: inline-block; padding: 8px 24px; border-radius: 30px; font-weight: 700; font-size: 14px; animation: badge-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes badge-pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .badge-approved { background: #d4edda; color: #155724; }
        .badge-conditional { background: #fff3cd; color: #856404; }
        .badge-rejected { background: #f8d7da; color: #721c24; }
        [data-theme="dark"] .badge-approved { background: #1e4620; color: #a3d9a5; }
        [data-theme="dark"] .badge-conditional { background: #664d03; color: #ffecb5; }
        [data-theme="dark"] .badge-rejected { background: #5c1e22; color: #f5c6cb; }

        /* History */
        .history { margin-top: 30px; border-top: 1px solid var(--border-color); padding-top: 20px; }
        .history-list { max-height: 250px; overflow-y: auto; background: var(--bg-form); border-radius: 12px; padding: 10px; margin-top: 12px; border: 1px solid var(--border-color); }
        .history-item { padding: 12px; border-bottom: 1px solid var(--border-color); font-size: 14px; display: flex; justify-content: space-between; align-items: center; border-radius: 6px; }
        .history-item:hover { background: var(--bg-container); }
        .status-label { font-weight: 600; padding: 2px 10px; border-radius: 30px; font-size: 12px; }

        /* Raw JSON */
        #rawJson { background: #1e1e2e; color: #a3d9a5; padding: 15px; border-radius: 8px; font-family: monospace; overflow: auto; display: none; }
        .toggle-raw { background: none; border: none; color: var(--agent-sales-border); cursor: pointer; text-decoration: underline; padding: 5px 0; margin-top: 10px; }

        .fade-in { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header-wrapper">
        <h1><i class="fas fa-robot"></i> Agentic AI - Multi Agent</h1>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">
            <i class="fas fa-moon"></i> Dark Mode
        </button>
    </div>
    
    <div id="statusBox" class="status-box offline"><i class="fas fa-circle"></i> Server: OFFLINE</div>

    <div class="flex-form">
        <div class="url-input">
            <label>URL Server (ngrok / localhost)
                <input id="ngrokUrl" type="url" placeholder="http://127.0.0.1:8000">
            </label>
        </div>
        <label>Produk
            <input id="product" value="Produk_X" list="productList">
            <datalist id="productList">
                <option value="Produk_X"><option value="Produk_Y"><option value="Produk_Z">
                <option value="Alpha_Part"><option value="Beta_Core">
            </datalist>
        </label>
        <label>Quantity
            <input id="quantity" type="number" value="1500" min="1" max="2000">
        </label>
        <label>Deadline (hari)
            <input id="deadline" type="number" value="5" min="2">
        </label>
        <button id="processBtn" class="primary-btn" onclick="processOrder()" disabled><i class="fas fa-paper-plane"></i> Proses Pesanan</button>
    </div>

    <div class="progress-wrapper" id="progressWrapper">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <div id="resultArea" class="fade-in">
        <div id="summaryContainer"></div>
        <button class="toggle-raw" onclick="toggleRaw()" style="display: none;"><i class="fas fa-code"></i> Lihat JSON Mentah</button>
        <pre id="rawJson"></pre>
    </div>

    <div class="history">
        <h3><i class="fas fa-history"></i> Riwayat Pesanan</h3>
        <div id="historyList" class="history-list">
            <div class="history-item" style="color: var(--text-muted); justify-content: center;">Belum ada aktivitas</div>
        </div>
    </div>
</div>

<script>
    let historyData = [];
    let statusCheckInterval = null;
    let isProcessing = false;

    // ====================== THEME LOGIC ======================
    function initTheme() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);
    }

    function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        
        html.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateThemeIcon(newTheme);
    }

    function updateThemeIcon(theme) {
        const btn = document.getElementById('themeBtn');
        if (theme === 'dark') {
            btn.innerHTML = '<i class="fas fa-sun"></i> Light Mode';
        } else {
            btn.innerHTML = '<i class="fas fa-moon"></i> Dark Mode';
        }
    }

    // ====================== VALIDASI & STATUS ======================
    function validateInputs() {
        const qty = document.getElementById('quantity');
        const dl = document.getElementById('deadline');
        const product = document.getElementById('product').value.trim();
        let valid = true;

        const qtyVal = parseInt(qty.value);
        if (isNaN(qtyVal) || qtyVal < 1 || qtyVal > 2000) {
            qty.classList.add('invalid'); qty.classList.remove('valid'); valid = false;
        } else {
            qty.classList.remove('invalid'); qty.classList.add('valid');
        }

        const dlVal = parseInt(dl.value);
        if (isNaN(dlVal) || dlVal < 2 || dlVal > 30) {
            dl.classList.add('invalid'); dl.classList.remove('valid'); valid = false;
        } else {
            dl.classList.remove('invalid'); dl.classList.add('valid');
        }

        if (!product) valid = false;
        
        const isOffline = document.getElementById('statusBox').classList.contains('offline');
        if (!isProcessing) {
            document.getElementById('processBtn').disabled = !valid || isOffline;
        }
        return valid && !isOffline;
    }

    document.querySelectorAll('input').forEach(el => el.addEventListener('input', validateInputs));

    async function checkStatus() {
        const url = document.getElementById('ngrokUrl').value.trim().replace(/\/+$/, '');
        if (!url) {
            document.getElementById('statusBox').className = 'status-box offline';
            document.getElementById('statusBox').innerHTML = '<i class="fas fa-circle"></i> Server: OFFLINE (URL Kosong)';
            return;
        }

        try {
            const resp = await fetch(`${url}/health`, { headers: { 'ngrok-skip-browser-warning': 'true' }});
            if (resp.ok) {
                document.getElementById('statusBox').className = 'status-box online';
                document.getElementById('statusBox').innerHTML = '<i class="fas fa-circle"></i> Server: ONLINE';
                validateInputs();
                return;
            }
            throw new Error('Gagal');
        } catch (error) {
            document.getElementById('statusBox').className = 'status-box offline';
            document.getElementById('statusBox').innerHTML = '<i class="fas fa-circle"></i> Server: OFFLINE';
            if (!isProcessing) document.getElementById('processBtn').disabled = true;
        }
    }

    document.getElementById('ngrokUrl').addEventListener('input', () => {
        if (!statusCheckInterval) statusCheckInterval = setInterval(checkStatus, 5000);
        checkStatus();
    });

    // ====================== PROSES PESANAN ======================
    async function processOrder() {
        const baseUrl = document.getElementById('ngrokUrl').value.trim().replace(/\/+$/, '');
        const payload = {
            product: document.getElementById('product').value.trim(),
            quantity: parseInt(document.getElementById('quantity').value),
            deadline: parseInt(document.getElementById('deadline').value)
        };

        isProcessing = true;
        const btn = document.getElementById('processBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="loading"></span> Memproses...';
        document.getElementById('progressWrapper').classList.add('active');
        document.getElementById('progressFill').style.width = '40%';
        document.getElementById('summaryContainer').innerHTML = '';
        document.getElementById('rawJson').style.display = 'none';

        try {
            const resp = await fetch(`${baseUrl}/process_order`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                body: JSON.stringify(payload)
            });

            if (!resp.ok) throw new Error(`HTTP Error: ${resp.status}`);

            const data = await resp.json();
            document.getElementById('progressFill').style.width = '100%';
            displayMultiAgentResult(data);
            addHistory(payload, data.status);

        } catch (error) {
            document.getElementById('progressFill').style.width = '100%';
            document.getElementById('summaryContainer').innerHTML = `
                <div class="agent-box agent-capacity" style="background:#f8d7da; border-color:#dc3545; color:#721c24;">
                    <strong><i class="fas fa-exclamation-triangle"></i> Error Koneksi:</strong> ${error.message}
                </div>`;
        } finally {
            setTimeout(() => {
                document.getElementById('progressWrapper').classList.remove('active');
                document.getElementById('progressFill').style.width = '0%';
                isProcessing = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> Proses Pesanan';
                validateInputs();
            }, 600);
        }
    }

    // ====================== MULTI-AGENT UI RENDERER ======================
    function displayMultiAgentResult(data) {
        const status = data.status || 'unknown';
        const agents = data.agents_interaction || {};

        let badgeClass = 'badge-';
        let statusLabel = '';
        let icon = '';

        switch(status.toLowerCase()) {
            case 'approved': badgeClass += 'approved'; statusLabel = 'DISETUJUI'; icon = 'fa-check-circle'; break;
            case 'conditional': badgeClass += 'conditional'; statusLabel = 'BERSYARAT'; icon = 'fa-exclamation-triangle'; break;
            case 'rejected': badgeClass += 'rejected'; statusLabel = 'DITOLAK'; icon = 'fa-times-circle'; break;
            default: badgeClass += 'pending'; statusLabel = 'ERROR'; icon = 'fa-question-circle';
        }

        // Ekstraksi nilai sisa stok dari AI
        let remainingStock = "Tidak Tersedia";
        if (agents.capacity_agent && agents.capacity_agent.remaining_stock !== undefined) {
            remainingStock = agents.capacity_agent.remaining_stock;
        } else if (data.capacity_result && data.capacity_result.stock_available !== undefined) {
            remainingStock = data.capacity_result.stock_available;
        }

        let summaryHtml = `
            <div class="summary fade-in">
                <div style="font-size: 1.1em; display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                    <strong>Status Eksekusi:</strong> 
                    <span class="status-badge ${badgeClass}"><i class="fas ${icon}"></i> ${statusLabel}</span>
                </div>
                
                <div class="agent-box agent-sales">
                    <strong style="color: var(--agent-sales-border);"><i class="fas fa-headset"></i> Sales Agent (Ingestion)</strong><br>
                    <span style="font-size: 14px; color: var(--text-muted); display:block; margin-top:4px;">${agents.sales_agent?.initial_action || '-'}</span>
                    <span style="font-size: 14px; font-style: italic; color: var(--text-main); margin-top:8px; display:block;">
                        <strong><i class="fas fa-handshake"></i> Auto-Nego:</strong> "${agents.sales_agent?.negotiation_action || '-'}"
                    </span>
                </div>

                <div class="agent-box agent-capacity">
                    <strong style="color: var(--agent-cap-text);"><i class="fas fa-warehouse"></i> Capacity & Inventory Agent (Gatekeeper)</strong><br>
                    <span style="font-size: 14px; color: var(--text-muted); display:block; margin-top:8px;">
                        <span style="display:inline-block; margin-bottom:6px;">Sisa Stok Gudang: <strong style="font-size: 15px; color: var(--text-main); background: var(--bg-body); padding: 2px 8px; border-radius: 4px;">${remainingStock} unit</strong></span><br>
                        Keputusan: <strong style="color: var(--text-main);">${agents.capacity_agent?.decision || '-'}</strong> <br>
                        Alasan Logis: "${agents.capacity_agent?.reasoning || '-'}"
                    </span>
                </div>

                <div class="agent-box agent-procurement">
                    <strong style="color: var(--agent-proc-border);"><i class="fas fa-truck-loading"></i> Procurement Agent (Eksekutor)</strong><br>
                    <span style="font-size: 14px; color: var(--text-muted); display:block; margin-top:8px;">
                        Status: <strong style="color: var(--text-main);">${agents.procurement_agent?.status || '-'}</strong> <br>
                        Tindakan: "${agents.procurement_agent?.action || '-'}"
                    </span>
                </div>
            </div>
        `;

        document.getElementById('summaryContainer').innerHTML = summaryHtml;
        document.getElementById('rawJson').textContent = JSON.stringify(data, null, 2);
        document.querySelector('.toggle-raw').style.display = 'inline-flex';
    }

    function addHistory(order, status) {
        historyData.unshift({ order, status: status.toLowerCase(), time: new Date().toLocaleTimeString() });
        if (historyData.length > 20) historyData.pop();
        
        const container = document.getElementById('historyList');
        container.innerHTML = historyData.map(item => `
            <div class="history-item">
                <div style="color: var(--text-main);"><strong>${item.order.product}</strong> × ${item.order.quantity} <span style="color: var(--text-muted); font-size:12px; margin-left:8px;">${item.time}</span></div>
                <span class="status-label badge-${item.status}">${item.status.toUpperCase()}</span>
            </div>
        `).join('');
    }

    function toggleRaw() {
        const el = document.getElementById('rawJson');
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    // ====================== INIT ======================
    window.onload = function() {
        initTheme();
        validateInputs();
        
        // Dummy Data untuk testing visual awal
        const dummyData = {
            order: { product: 'Produk_X', quantity: 1500, deadline: 5 },
            status: 'conditional',
            agents_interaction: {
                sales_agent: { initial_action: "Menerima pesanan 1500 unit Produk_X.", negotiation_action: "Klien ditawarkan pengiriman bertahap." },
                capacity_agent: { decision: "Conditional Approval", reasoning: "Stok kurang, mesin mengambil alih sisa pesanan.", remaining_stock: 500 },
                procurement_agent: { status: "Action Required", action: "Draft Purchase Order (PO) ke supplier dibuat otomatis." }
            }
        };
        displayMultiAgentResult(dummyData);
        addHistory(dummyData.order, dummyData.status);
    };
</script>
</body>
</html>
